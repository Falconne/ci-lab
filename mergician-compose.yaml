name: mergician

services:
  mergician:
    build:
      context: .
      dockerfile: Dockerfile.mergician-prod
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      Mergician__GitLab__Url: "${GITLAB_URL:-http://localhost:8081}"
      Mergician__GitLab__InternalUrl: "${GITLAB_INTERNAL_URL:-http://gitlab:8081}"
      Mergician__GitLab__OAuth__ClientId: "${MERGICIAN_GITLAB_OAUTH_CLIENT_ID:-}"
      Mergician__GitLab__OAuth__ClientSecret: "${MERGICIAN_GITLAB_OAUTH_CLIENT_SECRET:-}"
    env_file:
      - path: .env
        required: false
    networks:
      - default
      - ci-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  ci-network:
    external: true
    name: ci-lab_ci-network
