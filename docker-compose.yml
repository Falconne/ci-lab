version: '3.8'

services:
  gitlab:
    image: gitlab/gitlab-ce:18.7.0-ce.0
    restart: unless-stopped
    hostname: gitlab
    environment:
      GITLAB_ROOT_PASSWORD: "${GITLAB_ROOT_PASSWORD:-changeme123}"
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab'
    ports:
      - "8081:80"
      - "2222:22"
    networks:
      - ci-network

  teamcity:
    image: jetbrains/teamcity-server:2023.05
    restart: unless-stopped
    environment:
      TEAMCITY_SERVER_MEM_OPTS: "-Xmx1g"
    ports:
      - "8111:8111"
    networks:
      - ci-network
    depends_on:
      tc-jdbc-init:
        condition: service_completed_successfully
      tc-datadir-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - ./data/teamcity/datadir:/data/teamcity_server/datadir
      - ./data/teamcity/database.properties:/data/teamcity_server/datadir/config/database.properties:ro
      - ./data/teamcity/lib/jdbc:/data/teamcity_server/datadir/lib/jdbc:ro

  bootstrap:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    depends_on:
      - gitlab
      - teamcity
    env_file:
      - .env
    volumes:
      - ./src:/app:ro
      - ./data:/data:ro
    working_dir: /app
    entrypoint: ["/bin/sh", "-c", "dotnet run"]
    networks:
      - ci-network

  tc-jdbc-init:
    image: curlimages/curl:8.1.2
    restart: 'no'
    env_file:
      - .env
    volumes:
      - ./data/teamcity/lib/jdbc:/target
    depends_on:
      tc-datadir-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "-c", "mkdir -p /target && curl -fSL -o /target/postgresql-42.6.0.jar https://repo1.maven.org/maven2/org/postgresql/postgresql/42.6.0/postgresql-42.6.0.jar || exit 0"]
    networks:
      - ci-network

  tc-datadir-init:
    image: alpine:3.19
    restart: 'no'
    env_file:
      - .env
    volumes:
      - ./data/teamcity:/target
    entrypoint: ["/bin/sh", "-c", "rm -rf /target/datadir/* || true; mkdir -p /target/datadir /target/lib/jdbc /target/datadir/config || true; chmod -R 0777 /target/datadir /target/lib/jdbc || true; exit 0"]
    networks:
      - ci-network

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: teamcity
      POSTGRES_USER: teamcity
      POSTGRES_PASSWORD: teamcity_password
    volumes:
      - ./data/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - ci-network

networks:
  ci-network:
    driver: bridge
