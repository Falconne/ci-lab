services:
  cleanup-env:
    image: alpine:latest
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/sh", "-c"]
    command: ["rm -f .env"]
    restart: "no"

  gitlab:
    image: gitlab/gitlab-ce:18.7.0-ce.0
    restart: unless-stopped
    hostname: gitlab
    depends_on:
      cleanup-env:
        condition: service_completed_successfully
    environment:
      GITLAB_ROOT_PASSWORD: "${GITLAB_ROOT_PASSWORD:-changeme123}"
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8081'
        nginx['listen_port'] = 8081
    ports:
      - "8081:8081"
      - "2222:22"
    networks:
      - ci-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/-/health"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 120s

  gitlab-token-generator:
    image: alpine:latest
    depends_on:
      gitlab:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/sh", "-c"]
    command: ["/workspace/scripts/gitlab-token-generator.sh"]
    networks:
      - ci-network
    restart: "no"

  teamcity:
    image: jetbrains/teamcity-server:2023.05
    restart: unless-stopped
    depends_on:
      cleanup-env:
        condition: service_completed_successfully
    environment:
      TEAMCITY_SERVER_MEM_OPTS: "-Xmx1g"
    ports:
      - "8111:8111"
    networks:
      - ci-network

  teamcity-agent-1:
    image: jetbrains/teamcity-agent:2023.05
    restart: unless-stopped
    environment:
      SERVER_URL: "http://teamcity:8111"
      AGENT_NAME: "agent-1"
    depends_on:
      - teamcity
    networks:
      - ci-network

  teamcity-agent-2:
    image: jetbrains/teamcity-agent:2023.05
    restart: unless-stopped
    environment:
      SERVER_URL: "http://teamcity:8111"
      AGENT_NAME: "agent-2"
    depends_on:
      - teamcity
    networks:
      - ci-network

networks:
  ci-network:
    driver: bridge
